name: cr10
hosts:
  - name: app-server-ubuntu
    flavor: c4_r8_d60
    base_box:
      image: ubuntu-noble-x86_64
      mgmt_user: ubuntu
      mgmt_protocol: ssh
    hidden: false
  - name: client-web
    flavor: c2_r4_d40
    base_box:
      image: xubuntu-noble-x86_64
      mgmt_user: ubuntu
      mgmt_protocol: ssh
    hidden: false
routers:
  - name: router
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
    flavor: standard.small
networks:
  - name: network
    cidr: 10.0.0.0/24
    accessible_by_user: true
    hidden: false
wan:
  name: internet-connection
  cidr: 10.10.10.0/24
net_mappings:
    - host: app-server-ubuntu
      network: network
      ip: 10.0.0.10
    - host: client-web
      network: network
      ip: 10.0.0.11
router_mappings:
    - router: router
      network: network
      ip: 10.0.0.1
groups: []
